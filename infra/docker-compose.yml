services:
  postgres:
    image: postgres:15-alpine
    container_name: iot_research_db
    restart: unless-stopped
    ports:
      - "5453:5432"           # host 5453 → avoids conflict with any local PostgreSQL on 5432
    environment:
      POSTGRES_DB:       iot_research
      POSTGRES_USER:     pipeline
      POSTGRES_PASSWORD: pipepipe
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d iot_research"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
